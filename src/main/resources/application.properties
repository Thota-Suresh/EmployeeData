spring.application.name=Marks_service
# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/poc?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration (optional for JPA/Hibernate users)
spring.jpa.hibernate.ddl-auto=update 
 # other options: create, create-drop, validate
spring.jpa.show-sql=true  
# Enable SQL query logging in the console
spring.jpa.properties.hibernate.dialect: org.hibernate.dialect.MySQL8Dialect

# Connection Pool Configuration (HikariCP is the default connection pool)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
